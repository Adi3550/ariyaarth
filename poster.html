<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AriyaArth Enterprises - Official Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1A2B4C; /* Navy Blue */
    --silver: #A9A9A9;
    --accent: #E8A020; /* Gold/Orange from their old poster */
    --text: #333333;
  }
  
  body {
    margin: 0;
    padding: 0;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  /* A4 Aspect Ratio Container */
  .poster {
    width: 794px; /* A4 width at 96 DPI */
    height: 1123px; /* A4 height at 96 DPI */
    background-color: #ffffff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  /* Top Section */
  .header {
    padding: 50px 40px 30px;
    text-align: center;
    position: relative;
    z-index: 10;
  }

  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
  }

  .logo-img {
    height: 90px;
    width: auto;
  }

  .brand-title {
    font-family: 'Outfit', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--primary);
    margin: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Outfit', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    margin: 10px 0 0 0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
  }

  /* Decorative Swoosh (Top) */
  .swoosh-top {
    position: absolute;
    top: 250px;
    left: -10%;
    width: 120%;
    height: 200px;
    background: linear-gradient(135deg, var(--primary), #2a4365);
    border-radius: 50%;
    transform: rotate(-5deg);
    z-index: 1;
    box-shadow: 0 10px 30px rgba(26, 43, 76, 0.2);
  }
  
  .swoosh-top-2 {
    position: absolute;
    top: 270px;
    left: -10%;
    width: 120%;
    height: 200px;
    background: var(--silver);
    border-radius: 50%;
    transform: rotate(2deg);
    z-index: 0;
    opacity: 0.5;
  }

  /* Middle Content Section */
  .content {
    flex-grow: 1;
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 120px 40px 20px;
  }

  /* Images / Products Grid */
  .product-images {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 40px;
    width: 100%;
  }

  .product-img {
    width: 220px;
    height: 280px;
    object-fit: cover;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border: 4px solid white;
  }

  /* Brand Logos Section */
  .brands-section {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 20px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    margin-bottom: 40px;
    border: 1px solid rgba(0,0,0,0.05);
    width: 85%;
  }

  .brands-title {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0 0 15px 0;
  }

  .brands-grid {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand-logo {
    height: 45px;
    width: auto;
    object-fit: contain;
  }

  /* Address Section */
  .address-box {
    text-align: center;
    max-width: 80%;
    margin: 0 auto;
  }

  .address-title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--primary);
    margin: 0 0 10px 0;
  }

  .address-text {
    font-size: 18px;
    font-weight: 600;
    color: #555;
    line-height: 1.6;
    margin: 0;
  }

  /* Bottom Contact Section */
  .footer {
    background: var(--primary);
    padding: 30px 40px;
    color: white;
    position: relative;
    z-index: 10;
  }

  /* Decorative Swoosh (Bottom) */
  .footer::before {
    content: '';
    position: absolute;
    top: -30px;
    left: 0;
    width: 100%;
    height: 60px;
    background: var(--primary);
    border-radius: 50% 50% 0 0;
  }

  .contact-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    position: relative;
    z-index: 11;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 15px;
    font-size: 24px;
    font-weight: 600;
  }

  .contact-icon {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="poster">
  
  <!-- Top Header -->
  <div class="header">
    <div class="logo-container">
      <img src="assets/images/final_logo.webp" alt="Logo" class="logo-img">
      <h1 class="brand-title">AriyaArth Enterprises</h1>
    </div>
    <h2 class="subtitle">Distributor for Inner Wear & Outer Wear</h2>
  </div>

  <!-- Decorative Shapes -->
  <div class="swoosh-top"></div>
  <div class="swoosh-top-2"></div>

  <!-- Main Content -->
  <div class="content">
    
    <!-- Showcase Images -->
    <div class="product-images">
      <img src="assets/images/hero_garments.webp" class="product-img" alt="Menswear">
      <img src="assets/images/cat_innerwear.webp" class="product-img" alt="Innerwear">
      <img src="assets/images/cat_outerwear.webp" class="product-img" alt="Outerwear">
    </div>

    <!-- Brands Section -->
    <div class="brands-section">
      <p class="brands-title">Authorized Wholesale Partners</p>
      <div class="brands-grid">
        <img src="assets/images/vanheusen.webp" class="brand-logo" alt="Van Heusen">
        <img src="assets/images/macroman.webp" class="brand-logo" alt="Macroman">
        <img src="assets/images/bodycare.webp" class="brand-logo" alt="Bodycare">
        <img src="assets/images/reebok.webp" class="brand-logo" alt="Reebok">
      </div>
    </div>

    <!-- Address -->
    <div class="address-box">
      <h3 class="address-title">Address:</h3>
      <p class="address-text">
        Shop No. 14, Bldg. - A, Mandarin Court, Nirvana Nest,<br>
        Opposite Government Primary School,<br>
        Gaulembhat, Chimbel, Panjim, Goa - 403006.
      </p>
    </div>

  </div>

  <!-- Footer Contact -->
  <div class="footer">
    <div class="contact-info">
      <div class="contact-item">
        <div class="contact-icon">📞</div>
        8010089316 / 9022202927
      </div>
      <div class="contact-item">
        <div class="contact-icon">✉️</div>
        ariyaarthenterprises@gmail.com
      </div>
    </div>
  </div>

</div>

</body>
</html>
